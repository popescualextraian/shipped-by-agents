<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="700" fill="#ffffff"/>

  <!-- Tagline -->
  <text x="600" y="32" text-anchor="middle" font-size="15.5" font-style="italic" fill="#0A2540">A structured enablement engine that takes delivery teams from where they are today to AI-native.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CARD 1: THE BRIDGE                             -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="30" y="55" width="310" height="310" rx="8" fill="#f7f9fb" stroke="#e0e6ed" stroke-width="1"/>
  <rect x="30" y="55" width="310" height="5" rx="2.5" fill="#0A2540"/>
  <text x="50" y="86" font-size="11" font-weight="700" letter-spacing="2.5" fill="#0A2540">THE ENGINE</text>
  <text x="50" y="122" font-size="28" font-weight="700" fill="#0A2540">The Bridge</text>
  <line x1="50" y1="133" x2="130" y2="133" stroke="#00BFA5" stroke-width="3" stroke-linecap="round"/>
  <text x="50" y="160" font-size="13.5" fill="#4a5568">Central strategy, research, and training</text>
  <text x="50" y="179" font-size="13.5" fill="#4a5568">team. Builds guides, templates, and</text>
  <text x="50" y="198" font-size="13.5" fill="#4a5568">training materials. Trains Pathfinders.</text>
  <text x="50" y="217" font-size="13.5" fill="#4a5568">Tracks what works.</text>
  <text x="50" y="260" font-size="12.5" font-style="italic" fill="#94a3b8">Lead + AI Engineers +</text>
  <text x="50" y="278" font-size="12.5" font-style="italic" fill="#94a3b8">Training Lead + Analyst</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ARROW 1: Bridge ↔ Pathfinders                  -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="355" y="162" width="110" height="68" rx="8" fill="#0A2540"/>
  <!-- Top row: "strategy" + → -->
  <text x="375" y="190" font-size="12.5" fill="#cbd5e1" font-weight="600">strategy</text>
  <text x="445" y="191" font-size="16" fill="#00BFA5" font-weight="700">&#x2192;</text>
  <!-- Divider -->
  <line x1="365" y1="200" x2="455" y2="200" stroke="#1e3a5f" stroke-width="0.5"/>
  <!-- Bottom row: ← + "feedback" -->
  <text x="363" y="222" font-size="16" fill="#E8722A" font-weight="700">&#x2190;</text>
  <text x="383" y="221" font-size="12.5" fill="#cbd5e1" font-weight="600">feedback</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CARD 2: PATHFINDERS                             -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="480" y="55" width="310" height="310" rx="8" fill="#f7f9fb" stroke="#e0e6ed" stroke-width="1"/>
  <rect x="480" y="55" width="310" height="5" rx="2.5" fill="#0A2540"/>
  <text x="500" y="86" font-size="11" font-weight="700" letter-spacing="2.5" fill="#0A2540">THE COACHES</text>
  <text x="500" y="122" font-size="28" font-weight="700" fill="#0A2540">Pathfinders</text>
  <line x1="500" y1="133" x2="600" y2="133" stroke="#00BFA5" stroke-width="3" stroke-linecap="round"/>
  <text x="500" y="160" font-size="13.5" fill="#4a5568">Part of the crews, they teach by</text>
  <text x="500" y="179" font-size="13.5" fill="#4a5568">doing. Maintain constant communication</text>
  <text x="500" y="198" font-size="13.5" fill="#4a5568">with the Bridge. Coach team members.</text>
  <text x="500" y="217" font-size="13.5" fill="#4a5568">Publish ideas and patterns to the</text>
  <text x="500" y="236" font-size="13.5" fill="#4a5568">shared repository.</text>
  <text x="500" y="278" font-size="12.5" font-style="italic" fill="#94a3b8">The core of the program</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ARROW 2: Pathfinders ↔ Crews                    -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="805" y="162" width="110" height="68" rx="8" fill="#0A2540"/>
  <!-- Top row: "coaching" + → -->
  <text x="825" y="190" font-size="12.5" fill="#cbd5e1" font-weight="600">coaching</text>
  <text x="895" y="191" font-size="16" fill="#00BFA5" font-weight="700">&#x2192;</text>
  <!-- Divider -->
  <line x1="815" y1="200" x2="905" y2="200" stroke="#1e3a5f" stroke-width="0.5"/>
  <!-- Bottom row: ← + "patterns" -->
  <text x="813" y="222" font-size="16" fill="#E8722A" font-weight="700">&#x2190;</text>
  <text x="833" y="221" font-size="12.5" fill="#cbd5e1" font-weight="600">patterns</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CARD 3: CREWS                                   -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="930" y="55" width="240" height="310" rx="8" fill="#f7f9fb" stroke="#e0e6ed" stroke-width="1"/>
  <rect x="930" y="55" width="240" height="5" rx="2.5" fill="#0A2540"/>
  <text x="950" y="86" font-size="11" font-weight="700" letter-spacing="2.5" fill="#0A2540">THE CREWS</text>
  <text x="950" y="122" font-size="28" font-weight="700" fill="#0A2540">Crews</text>
  <line x1="950" y1="133" x2="1015" y2="133" stroke="#00BFA5" stroke-width="3" stroke-linecap="round"/>
  <text x="950" y="158" font-size="13" fill="#4a5568">Progress through maturity levels:</text>
  <text x="950" y="182" font-size="13" fill="#4a5568"><tspan font-weight="700" fill="#00BFA5">L0</tspan> Landlubber &#x2192; <tspan font-weight="700" fill="#00BFA5">L1</tspan> Deckhand</text>
  <text x="950" y="202" font-size="13" fill="#4a5568"><tspan font-weight="700" fill="#00BFA5">L2</tspan> Sailor &#x2192; <tspan font-weight="700" fill="#00BFA5">L3</tspan> Mate</text>
  <text x="950" y="222" font-size="13" fill="#4a5568"><tspan font-weight="700" fill="#00BFA5">L4</tspan> Captain &#x2192; <tspan font-weight="700" fill="#00BFA5">L5</tspan> Commodore</text>
  <text x="950" y="242" font-size="13" fill="#4a5568"><tspan font-weight="700" fill="#00BFA5">L6</tspan> Fleet Admiral</text>
  <text x="950" y="282" font-size="12.5" font-style="italic" fill="#94a3b8">Waves: 3–5 pilots &#x2192; 10–20 &#x2192; all teams</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- DOWN ARROW: Bridge → Forge (slimmer)            -->
  <!-- ═══════════════════════════════════════════════ -->
  <line x1="185" y1="370" x2="185" y2="415" stroke="#0A2540" stroke-width="3"/>
  <polygon points="185,425 175,410 195,410" fill="#0A2540"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- THE FORGE                                       -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="30" y="435" width="310" height="130" rx="8" fill="#f7f9fb" stroke="#e0e6ed" stroke-width="1"/>
  <rect x="30" y="435" width="5" height="130" rx="2.5" fill="#E8722A"/>
  <text x="55" y="473" font-size="24" font-weight="700" fill="#0A2540">The Forge</text>
  <line x1="55" y1="482" x2="125" y2="482" stroke="#E8722A" stroke-width="3" stroke-linecap="round"/>
  <text x="55" y="505" font-size="13.5" fill="#4a5568">Builds custom agents, tools, and shared</text>
  <text x="55" y="524" font-size="13.5" fill="#4a5568">automations. When multiple teams need</text>
  <text x="55" y="543" font-size="13.5" fill="#4a5568">the same thing, Forge builds it once.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- FIVE PILLARS                                    -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="410" y="425" width="760" height="150" rx="8" fill="#f7f9fb" stroke="#e0e6ed" stroke-width="1"/>
  <text x="435" y="458" font-size="20" font-weight="700" font-style="italic" fill="#0A2540">Five Pillars of the Program</text>

  <!-- Pillar 1: Symbiosis -->
  <rect x="435" y="475" width="132" height="80" rx="6" fill="#0A2540"/>
  <text x="501" y="502" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Symbiosis</text>
  <text x="501" y="521" text-anchor="middle" font-size="10.5" fill="#00BFA5">Human + AI</text>
  <text x="501" y="535" text-anchor="middle" font-size="10.5" fill="#00BFA5">partnership</text>

  <!-- Pillar 2: Coaching -->
  <rect x="580" y="475" width="132" height="80" rx="6" fill="#0A2540"/>
  <text x="646" y="502" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Coaching</text>
  <text x="646" y="521" text-anchor="middle" font-size="10.5" fill="#00BFA5">Teach by doing,</text>
  <text x="646" y="535" text-anchor="middle" font-size="10.5" fill="#00BFA5">embedded in teams</text>

  <!-- Pillar 3: Repository -->
  <rect x="725" y="475" width="132" height="80" rx="6" fill="#0A2540"/>
  <text x="791" y="502" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Repository</text>
  <text x="791" y="521" text-anchor="middle" font-size="10.5" fill="#00BFA5">Ideas up,</text>
  <text x="791" y="535" text-anchor="middle" font-size="10.5" fill="#00BFA5">solutions down</text>

  <!-- Pillar 4: Client-Centric -->
  <rect x="870" y="475" width="132" height="80" rx="6" fill="#0A2540"/>
  <text x="936" y="502" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Client-Centric</text>
  <text x="936" y="521" text-anchor="middle" font-size="10.5" fill="#00BFA5">Tool-agnostic,</text>
  <text x="936" y="535" text-anchor="middle" font-size="10.5" fill="#00BFA5">adapts to context</text>

  <!-- Pillar 5: Feedback Loop -->
  <rect x="1015" y="475" width="132" height="80" rx="6" fill="#0A2540"/>
  <text x="1081" y="502" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Feedback Loop</text>
  <text x="1081" y="521" text-anchor="middle" font-size="10.5" fill="#00BFA5">Continuous</text>
  <text x="1081" y="535" text-anchor="middle" font-size="10.5" fill="#00BFA5">two-way flow</text>

</svg>