<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="1000" height="350">
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; fill: #0A2540; font-weight: 700; }
    .phase-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #fff; font-weight: 600; }
    .guide-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #fff; font-weight: 600; }
    .sensor-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #fff; font-weight: 500; }
    .row-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .arrow { fill: none; stroke: #e0e6ed; stroke-width: 1.5; }
    .arrow-head { fill: #e0e6ed; }
  </style>

  <!-- Title -->
  <text x="500" y="28" class="title" text-anchor="middle">The Agentic Development Harness</text>

  <!-- Row labels -->
  <text x="14" y="100" class="row-label">Guides</text>
  <text x="14" y="185" class="row-label">Phases</text>
  <text x="14" y="270" class="row-label">Sensors</text>

  <!-- Phase boxes: 9 phases, each 88px wide with 12px gap, starting at x=70 -->
  <!-- Phase 1: Conception -->
  <rect x="70" y="160" width="88" height="48" rx="5" fill="#0A2540"/>
  <text x="114" y="188" class="phase-label" text-anchor="middle">Conception</text>

  <!-- Phase 2: Specification -->
  <rect x="170" y="160" width="88" height="48" rx="5" fill="#0A2540"/>
  <text x="214" y="188" class="phase-label" text-anchor="middle">Specification</text>

  <!-- Phase 3: Design -->
  <rect x="270" y="160" width="88" height="48" rx="5" fill="#0A2540"/>
  <text x="314" y="188" class="phase-label" text-anchor="middle">Design</text>

  <!-- Phase 4: Implementation -->
  <rect x="370" y="160" width="88" height="48" rx="5" fill="#0A2540"/>
  <text x="414" y="182" class="phase-label" text-anchor="middle">Implemen-</text>
  <text x="414" y="196" class="phase-label" text-anchor="middle">tation</text>

  <!-- Phase 5: Testing -->
  <rect x="470" y="160" width="88" height="48" rx="5" fill="#0A2540"/>
  <text x="514" y="188" class="phase-label" text-anchor="middle">Testing</text>

  <!-- Phase 6: Review -->
  <rect x="570" y="160" width="88" height="48" rx="5" fill="#0A2540"/>
  <text x="614" y="188" class="phase-label" text-anchor="middle">Review</text>

  <!-- Phase 7: Quality Gates -->
  <rect x="670" y="160" width="88" height="48" rx="5" fill="#0A2540"/>
  <text x="714" y="182" class="phase-label" text-anchor="middle">Quality</text>
  <text x="714" y="196" class="phase-label" text-anchor="middle">Gates</text>

  <!-- Phase 8: Optimization -->
  <rect x="770" y="160" width="88" height="48" rx="5" fill="#0A2540"/>
  <text x="814" y="188" class="phase-label" text-anchor="middle">Optimization</text>

  <!-- Phase 9: Maintenance -->
  <rect x="870" y="160" width="88" height="48" rx="5" fill="#0A2540"/>
  <text x="914" y="188" class="phase-label" text-anchor="middle">Maintenance</text>

  <!-- Arrows between phases -->
  <line x1="158" y1="184" x2="170" y2="184" class="arrow"/>
  <polygon points="168,181 174,184 168,187" class="arrow-head"/>
  <line x1="258" y1="184" x2="270" y2="184" class="arrow"/>
  <polygon points="268,181 274,184 268,187" class="arrow-head"/>
  <line x1="358" y1="184" x2="370" y2="184" class="arrow"/>
  <polygon points="368,181 374,184 368,187" class="arrow-head"/>
  <line x1="458" y1="184" x2="470" y2="184" class="arrow"/>
  <polygon points="468,181 474,184 468,187" class="arrow-head"/>
  <line x1="558" y1="184" x2="570" y2="184" class="arrow"/>
  <polygon points="568,181 574,184 568,187" class="arrow-head"/>
  <line x1="658" y1="184" x2="670" y2="184" class="arrow"/>
  <polygon points="668,181 674,184 668,187" class="arrow-head"/>
  <line x1="758" y1="184" x2="770" y2="184" class="arrow"/>
  <polygon points="768,181 774,184 768,187" class="arrow-head"/>
  <line x1="858" y1="184" x2="870" y2="184" class="arrow"/>
  <polygon points="868,181 874,184 868,187" class="arrow-head"/>

  <!-- Guide labels (above) — taper: larger/bolder at left, lighter at right -->
  <!-- Guide connectors (vertical lines from guide pill to phase box) -->

  <!-- Guide 1: CLAUDE.md — largest -->
  <rect x="74" y="80" width="80" height="26" rx="13" fill="#00BFA5"/>
  <text x="114" y="97" class="guide-label" text-anchor="middle" font-size="11">CLAUDE.md</text>
  <line x1="114" y1="106" x2="114" y2="160" stroke="#00BFA5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Guide 2: Spec templates -->
  <rect x="172" y="82" width="84" height="24" rx="12" fill="#00BFA5"/>
  <text x="214" y="98" class="guide-label" text-anchor="middle" font-size="10.5">Spec templates</text>
  <line x1="214" y1="106" x2="214" y2="160" stroke="#00BFA5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Guide 3: ADRs -->
  <rect x="284" y="84" width="60" height="22" rx="11" fill="#00BFA5"/>
  <text x="314" y="99" class="guide-label" text-anchor="middle" font-size="10">ADRs</text>
  <line x1="314" y1="106" x2="314" y2="160" stroke="#00BFA5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Guide 4: Hooks -->
  <rect x="386" y="86" width="56" height="20" rx="10" fill="#00BFA5"/>
  <text x="414" y="100" class="guide-label" text-anchor="middle" font-size="9.5">Hooks</text>
  <line x1="414" y1="106" x2="414" y2="160" stroke="#00BFA5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Guide 5: Test rules -->
  <rect x="484" y="87" width="60" height="19" rx="10" fill="#00BFA5"/>
  <text x="514" y="100" class="guide-label" text-anchor="middle" font-size="9">Test rules</text>
  <line x1="514" y1="106" x2="514" y2="160" stroke="#00BFA5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Guide 6: Checklist -->
  <rect x="583" y="88" width="62" height="18" rx="9" fill="#00BFA5"/>
  <text x="614" y="100.5" class="guide-label" text-anchor="middle" font-size="9">Checklist</text>
  <line x1="614" y1="106" x2="614" y2="160" stroke="#00BFA5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Guide 7: SonarQube -->
  <rect x="681" y="88" width="66" height="18" rx="9" fill="#00BFA5"/>
  <text x="714" y="100.5" class="guide-label" text-anchor="middle" font-size="9">SonarQube</text>
  <line x1="714" y1="106" x2="714" y2="160" stroke="#00BFA5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Guide 8: Budgets -->
  <rect x="785" y="89" width="58" height="17" rx="9" fill="#00BFA5" opacity="0.85"/>
  <text x="814" y="101" class="guide-label" text-anchor="middle" font-size="8.5">Budgets</text>
  <line x1="814" y1="106" x2="814" y2="160" stroke="#00BFA5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Guide 9: Log docs -->
  <rect x="885" y="89" width="58" height="17" rx="9" fill="#00BFA5" opacity="0.75"/>
  <text x="914" y="101" class="guide-label" text-anchor="middle" font-size="8.5">Log docs</text>
  <line x1="914" y1="106" x2="914" y2="160" stroke="#00BFA5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Sensor labels (below) — uniform size -->
  <!-- Sensor connectors (vertical lines from phase box to sensor pill) -->

  <!-- Sensor 1: Checklist -->
  <line x1="114" y1="208" x2="114" y2="243" stroke="#E8722A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="79" y="243" width="70" height="22" rx="11" fill="#E8722A"/>
  <text x="114" y="258" class="sensor-label" text-anchor="middle">Checklist</text>

  <!-- Sensor 2: Review skill -->
  <line x1="214" y1="208" x2="214" y2="243" stroke="#E8722A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="175" y="243" width="78" height="22" rx="11" fill="#E8722A"/>
  <text x="214" y="258" class="sensor-label" text-anchor="middle">Review skill</text>

  <!-- Sensor 3: Fitness check -->
  <line x1="314" y1="208" x2="314" y2="243" stroke="#E8722A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="274" y="243" width="80" height="22" rx="11" fill="#E8722A"/>
  <text x="314" y="258" class="sensor-label" text-anchor="middle">Fitness check</text>

  <!-- Sensor 4: Linter/Tests -->
  <line x1="414" y1="208" x2="414" y2="243" stroke="#E8722A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="377" y="243" width="74" height="22" rx="11" fill="#E8722A"/>
  <text x="414" y="258" class="sensor-label" text-anchor="middle">Linter/Tests</text>

  <!-- Sensor 5: Coverage -->
  <line x1="514" y1="208" x2="514" y2="243" stroke="#E8722A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="480" y="243" width="68" height="22" rx="11" fill="#E8722A"/>
  <text x="514" y="258" class="sensor-label" text-anchor="middle">Coverage</text>

  <!-- Sensor 6: Review agent -->
  <line x1="614" y1="208" x2="614" y2="243" stroke="#E8722A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="574" y="243" width="80" height="22" rx="11" fill="#E8722A"/>
  <text x="614" y="258" class="sensor-label" text-anchor="middle">Review agent</text>

  <!-- Sensor 7: Quality gate -->
  <line x1="714" y1="208" x2="714" y2="243" stroke="#E8722A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="676" y="243" width="76" height="22" rx="11" fill="#E8722A"/>
  <text x="714" y="258" class="sensor-label" text-anchor="middle">Quality gate</text>

  <!-- Sensor 8: Benchmarks -->
  <line x1="814" y1="208" x2="814" y2="243" stroke="#E8722A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="776" y="243" width="76" height="22" rx="11" fill="#E8722A"/>
  <text x="814" y="258" class="sensor-label" text-anchor="middle">Benchmarks</text>

  <!-- Sensor 9: Doc sync -->
  <line x1="914" y1="208" x2="914" y2="243" stroke="#E8722A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="880" y="243" width="68" height="22" rx="11" fill="#E8722A"/>
  <text x="914" y="258" class="sensor-label" text-anchor="middle">Doc sync</text>

  <!-- Legend -->
  <rect x="340" y="305" width="12" height="12" rx="3" fill="#00BFA5"/>
  <text x="358" y="316" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #4a5568;">Guides (feedforward)</text>
  <rect x="500" y="305" width="12" height="12" rx="3" fill="#E8722A"/>
  <text x="518" y="316" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #4a5568;">Sensors (feedback)</text>
  <rect x="650" y="305" width="12" height="12" rx="3" fill="#0A2540"/>
  <text x="668" y="316" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #4a5568;">SDLC Phases</text>

  <!-- Taper annotation -->
  <text x="70" y="60" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #94a3b8; font-style: italic;">Heavy guidance</text>
  <line x1="150" y1="57" x2="900" y2="57" stroke="#e0e6ed" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="910" y="60" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #94a3b8; font-style: italic;">Light</text>
</svg>